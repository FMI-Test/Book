10. Fakhran:
- Title: Aliyar-Fakhran-Reze-Shah-Diplomat
  Prompt: | 
   A dignified Reze-Shah-era Iranian diplomat in formal frock coat and military
    decorations, standing before a grand European embassy. Oil painting aesthetic,
    warm candlelight, late 19th century St. Petersburg architecture in background.
    Persian calligraphy border. Photorealistic historical portrait.

- Title: Aliyar-Fakhran-Dar-Al-Fonun
  Prompt: | 
   Interior of Dar al-Fonun school Tehran 1870s. Young Persian students in Reza Shah dress studying with European instructors. Maps of Iran and Russia on walls. Ornate Persian tilework. Historical illustration style, sepia tones.

- Title: Aliyar-Fakhran-Tbilisi-Consulate
  Prompt: | 
   The General Consulate of Iran in Tbilisi (Tiflis) circa 1890. Grand Caucasian architecture, Persian flag, officials in formal dress. Mountain backdrop, Georgian and Persian architectural fusion. Refined oil painting style.

- Title: Aliyar-Fakhran-Lion-Sun-Medal
  Prompt: | 
   Close-up of the Persian Imperial Order of the Lion and Sun medal on velvet.mGold and enamel, intricate Persian craftsmanship, 19th century. Museum display lighting. Photorealistic macro photograph.

- Title: Aliyar-Fakhran-Petersburg-Embassy
  Prompt: | 
   The Imperial Russian capital St. Petersburg 1900s. Iranian embassy building, Persian and Russian flags side by side, horse-drawn carriages, snow. Reze Shah diplomat descending embassy steps in full regalia. Cinematic historical painting.

- Title: Aliyar-Fakhran-Batumi-Consulate
  Prompt: | 
   Port city of Batumi on the Black Sea circa 1905. Iranian consulate building with Persian architectural accents. Shipping vessels in harbor, busy trade port. Atmospheric watercolor style, golden hour light.

- Title: Aliyar-Fakhran-Bujnurd-Governor
  Prompt: | 
   The walled city of Bujnurd in Khorasan province, Iran, early 20th century. Governor's compound, mud-brick architecture, desert landscape, Alborz foothills. Governor in traditional dress overseeing local affairs. Historical illustration style. Ink and watercolor illustration, warm earthy tones.

- Title: Aliyar-Fakhran-Reza-Shah-Era
  Prompt: | 
   Iran modernization era 1920s under Reza Shah. Split scene — traditional Reza Shah turbans on left, new Pahlavi bowler hats and military uniforms on right. Symbol of institutional transformation. Graphic history illustration style.

- Title: Aliyar-Fakhran-Leningrad-Ambassador
  Prompt: | 
   Soviet Leningrad 1930s. Iranian ambassador in diplomatic dress standing before the Winter Palace. Persian flag, Soviet iconography. Tension and dignity coexisting. Cinematic oil painting, cold blue light.coexisting. Cinematic oil painting, cold blue light.

- Title: Aliyar-Fakhran-Calligraphy-Wall
  Prompt: | 
   Traditional Persian courtyard with freshly whitewashed walls. Young man secretly writing Persian calligraphy in charcoal. Caught mid-stroke. The master approaches from the gate. Moment of discipline and recognition. Persian miniature painting style with rich lapis and gold.

- Title: Aliyar-Fakhran-Dinner-Protocol
  Prompt: | 
   Formal Persian dinner gathering, early 20th century Khorasan. Head of table occupied by distinguished elder in military decorations. Guests arranged by rank and lineage. Children standing awaiting permission to sit. Lantern light, ornate rugs. Realistic historical illustration. Formal Persian dinner gathering, early 20th century Khorasan. Head of table occupied by distinguished elder in military decorations. Guests arranged by rank and lineage. Children standing awaiting permission to sit. Lantern light, ornate rugs. Realistic historical illustration.

- Title: Fakhran-Sara-Villa
  Prompt: | 
   Elegant two-story Caspian seaside villa 1960s Iran. Lush garden, tennis court, tiled terrace overlooking the sea at dusk. Warm summer evening, family silhouettes on the upper balcony. Nostalgic Iranian summer painting. Elegant two-story Caspian seaside villa 1960s Iran. Lush garden, tennis court, tiled terrace overlooking the sea at dusk. Warm summer evening, family silhouettes on the upper balcony. Nostalgic Iranian summer painting.

- Title: Aliyar-Fakhran-Bamdad-Heritage
  Prompt: | 
   Split portrait — left side shows a Reze-Shah-era Iranian diplomat in full military decorations, right side shows a modern Iranian-American tech architect at a whiteboard covered in system diagrams. Mirrored posture, different centuries, same sharp eyes. Conceptual diptych illustration.

- Title: Aliyar-Fakhran-Genealogy-Tree
  Prompt: | 
   Persian family tree illuminated manuscript style. Ornate gold calligraphy branches connecting generations from Reze-Shah diplomat to modern descendants. Lapis lazuli background, Persian floral borders, names in elegant Naskh script. Museum-quality manuscript illustration.

- Title: Aliyar-Fakhran-Golestan-Forest-Road
  Prompt: | 
   The deadly beautiful Golestan Forest road between Gorgan and Bojnourd, 1970s Iran. Sharp hairpin turns through dense green forest canopy, two-lane asphalt winding steeply up and down. Oncoming traffic on a blind curve. Atmospheric landscape painting, dappled forest light, ominous beauty. Cinematic Iranian road aesthetic.

- Title: Aliyar-Fakhran-Garmeh-Jajarm-Landscape
  Prompt: | 
   Desert landscape near Garmeh and Jajarm, Khorasan, 1970s Iran. A rutted dirt road through arid hills descending into wide-open desert, a solitary truck navigating ridges between deep ruts. In the distance a small town with green trees and a spring oasis against a fiery desert backdrop. Ruins of a 2500-year-old Achaemenid postal relay station visible on the roadside. Warm earthy tones, golden hour, cinematic landscape painting.

- Title: Aliyar-Fakhran-Jajarm-Clay-Fortress
  Prompt: | 
   Ancient clay fortress in the center of Jajarm, Khorasan. Mud-brick walls towering over a desert town square, archaeological coins displayed in foreground. A gendarmerie outpost nearby. 5000 years of history compressed into sun-baked earth. Historical illustration, sepia and ochre palette.

- Title: Aliyar-Fakhran-Karim-Khan-Doctor
  Prompt: | 
   A village doctor practice in Jajarm, 1960s-70s Iran. Karim Khan Fakhran, a sociable physician in a white coat, seated behind a simple desk, exasperated by a rambling patient telling a long irrelevant story. Small-town clinic with medical instruments, Persian rugs. Warm humorous scene. Realistic historical illustration with a touch of comic storytelling.

- Title: Aliyar-Fakhran-Chess-Backgammon-Evening
  Prompt: | 
   Family evening in a traditional Khorasan home, 1970s Iran. A lively chess and backgammon game around a low table covered in a Persian tablecloth. Elder men and younger players trash-talking, a woman enchanting the dice, tea glasses and sweets. Warm lantern light, Persian carpets, laughter in the air. Nostalgic genre painting, rich warm colors.

- Title: Aliyar-Fakhran-Grandmothers-Curse
  Prompt: | 
   A sharp-tongued Persian grandmother in traditional dress seated in a courtyard, delivering a withering curse with a pointed finger. Young family members recoiling with a mix of fear and suppressed laughter. Dramatic theatrical lighting, Persian miniature composition meets family comedy. Rich lapis, gold, and crimson tones.

